services:
  server:
    image: odloader:latest
    container_name: odloader
    command: /bin/sh -c "cd /app && npm install --verbose  && npm run dev"
    depends_on:
      - oddata
    volumes:
      - ./apps/server:/app
    ports:
      - "3000:3000"
    expose:
      - 3000
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  oddata:
    image: pgrouting/pgrouting:latest
    restart: always
    ports:
      - "5436:5432"
    volumes:
      - ./database/db:/var/lib/postgresql/data
      - ./database/dbinit:/docker-entrypoint-initdb.d
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
      - PROJ_NETWORK=ON
      - PGHOST=/var/run/postgresql
      - PGPORT=5432
