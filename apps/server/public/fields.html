<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open Data Loader</title>
    <link rel="stylesheet" href="./resources.css" />
    <script src="./htmx.js"></script>
  </head>
  <body>
    <h1>What's all this then?</h1>
    <div id="datasets">
      <h2>Resource Fields</h2>
      <div
        id="fields-status"
        hx-get="/fields"
        hx-trigger="load"
        hx-swap="outerHTML"
        hx-vals="js:{
        id: new URLSearchParams(window.location.search).get('id'),
        name: new URLSearchParams(window.location.search).get('bucket_name'),
        acro: new URLSearchParams(window.location.search).get('table_name'),
        }"
      ></div>

      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Type</th>
            <th>Notes</th>
          </tr>
        </thead>
        <tbody id="fields">
          <tr>
            <td colspan="3">Loading...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </body>
</html>
