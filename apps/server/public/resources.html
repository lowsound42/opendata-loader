<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CoT Open Data Loader</title>
    <link rel="stylesheet" href="./resources.css" />
    <script src="./htmx.js"></script>
  </head>
  <body>
    <h1>CoT Open Data</h1>
    <div id="datasets">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Period</th>
            <th>Records</th>
            <th>Resource ID</th>
            <th></th>
          </tr>
        </thead>
        <tbody
          id="resources"
          hx-get="/resources"
          hx-trigger="load"
          hx-vals="js:{id: new URLSearchParams(window.location.search).get('id')}"
        >
          <tr>
            <td colspan="5">Loading...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </body>
</html>
